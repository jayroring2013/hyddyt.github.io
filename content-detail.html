<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... - LiDex Analytics</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        #debugBox {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            z-index: 9999;
            max-width: 400px;
            border: 1px solid #333;
        }
        #debugBox .ok { color: #22c55e; }
        #debugBox .error { color: #ef4444; }
        #debugBox .warn { color: #f59e0b; }
        #debugBox div { margin: 5px 0; }
    </style>
</head>
<body class="bg-light-900 dark:bg-dark-900 text-gray-900 dark:text-gray-100 min-h-screen">
    
    <!-- Debug Box (Remove after fixing) -->
    <div id="debugBox">
        <div class="ok" style="font-weight:bold;margin-bottom:10px;">🔍 DEBUG CONSOLE</div>
        <div id="debugContent">Initializing...</div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-custom">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="bar-chart-3" class="w-6 h-6 text-white"></i>
                    </div>
                    <span class="text-xl font-bold gradient-text">LiDex</span>
                </a>
                
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="content-detail.html" class="nav-link">Content</a>
                    <a href="reports.html" class="nav-link">Reports</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button data-theme-toggle class="theme-toggle">
                        <i data-lucide="moon" class="w-5 h-5 text-secondary"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-4">
        <div class="max-w-7xl mx-auto">
            <div id="loadingState" class="text-center py-20">
                <i data-lucide="loader-2" class="w-12 h-12 text-primary-500 animate-spin mx-auto mb-4"></i>
                <p class="text-secondary text-lg">Loading series data...</p>
            </div>
            
            <div id="errorState" class="hidden text-center py-20">
                <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                <h2 class="text-2xl font-bold text-primary mb-2">Failed to Load</h2>
                <p class="text-secondary mb-6" id="errorMessage">--</p>
                <a href="index.html" class="btn-primary inline-flex items-center space-x-2">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span>Back to Home</span>
                </a>
            </div>
            
            <div id="contentState" class="hidden">
                <div class="glass rounded-xl p-6">
                    <h1 id="seriesTitle" class="text-2xl font-bold text-primary mb-4">--</h1>
                    <p id="seriesDescription" class="text-secondary">--</p>
                    <div class="mt-4 flex gap-4">
                        <span class="px-3 py-1 bg-primary-500/20 text-primary-400 rounded text-sm" id="seriesType">--</span>
                        <span class="px-3 py-1 bg-green-500/20 text-green-400 rounded text-sm" id="seriesStatus">--</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts IN EXACT ORDER -->
    <script>
        // DEBUG: Track script loading
        const debugLog = [];
        function log(msg, type = 'info') {
            debugLog.push({msg, type});
            const el = document.getElementById('debugContent');
            if (el) {
                el.innerHTML += `<div class="${type}">▶ ${msg}</div>`;
            }
            console.log(`[${type.toUpperCase()}] ${msg}`);
        }
    </script>
    
    <!-- 1. Config FIRST -->
    <script src="assets/js/config.js"></script>
    <script>
        log('Step 1: config.js loaded', typeof SUPABASE_CONFIG !== 'undefined' ? 'ok' : 'error');
        if (typeof SUPABASE_CONFIG !== 'undefined') {
            log('  - URL: ' + (SUPABASE_CONFIG.url ? '✅' : '❌'), SUPABASE_CONFIG.url ? 'ok' : 'error');
            log('  - Key: ' + (SUPABASE_CONFIG.anonKey ? '✅ (hidden)' : '❌'), SUPABASE_CONFIG.anonKey ? 'ok' : 'error');
        } else {
            log('  - SUPABASE_CONFIG is undefined!', 'error');
        }
    </script>
    
    <!-- 2. Supabase Client SECOND -->
    <script src="assets/js/supabase.js"></script>
    <script>
        log('Step 2: supabase.js loaded', typeof window.db !== 'undefined' ? 'ok' : 'error');
        if (typeof window.db !== 'undefined') {
            log('  - window.db: ✅', 'ok');
        } else {
            log('  - window.db: undefined', 'error');
        }
    </script>
    
    <!-- 3. API THIRD -->
    <script src="assets/js/api.js"></script>
    <script>
        log('Step 3: api.js loaded', typeof window.api !== 'undefined' ? 'ok' : 'error');
    </script>
    
    <!-- 4. Theme & Nav -->
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/nav.js"></script>
    
    <!-- 5. Page Script LAST -->
    <script>
        let currentSeriesId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            log('Step 4: DOMContentLoaded', 'ok');
            lucide.createIcons();
            
            // Wait for all scripts to initialize
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            log('Step 5: Checking initialization...', 'warn');
            log('  - SUPABASE_CONFIG: ' + (typeof SUPABASE_CONFIG !== 'undefined' ? '✅' : '❌'), typeof SUPABASE_CONFIG !== 'undefined' ? 'ok' : 'error');
            log('  - window.db: ' + (typeof window.db !== 'undefined' ? '✅' : '❌'), typeof window.db !== 'undefined' ? 'ok' : 'error');
            log('  - window.api: ' + (typeof window.api !== 'undefined' ? '✅' : '❌'), typeof window.api !== 'undefined' ? 'ok' : 'error');
            
            // Get series ID
            const urlParams = new URLSearchParams(window.location.search);
            currentSeriesId = urlParams.get('id');
            log('Step 6: Series ID from URL: ' + (currentSeriesId || 'null'), currentSeriesId ? 'ok' : 'warn');
            
            if (!currentSeriesId) {
                showError('No series ID in URL. Add ?id=1 to the URL.');
                return;
            }
            
            // Check database connection
            if (!window.db) {
                log('Step 7: Database NOT connected!', 'error');
                showError('Database not connected. Check debug box (top-right) for details.');
                return;
            }
            
            log('Step 7: Testing database connection...', 'warn');
            
            // Test connection
            try {
                const { data, error } = await window.db
                    .from('series')
                    .select('id, title')
                    .eq('id', currentSeriesId)
                    .single();
                
                if (error) {
                    log('Step 8: Query failed: ' + error.message, 'error');
                    showError('Database error: ' + error.message);
                    return;
                }
                
                if (!data) {
                    log('Step 8: Series not found with ID ' + currentSeriesId, 'error');
                    showError('Series ID ' + currentSeriesId + ' not found in database.');
                    return;
                }
                
                log('Step 8: Series loaded successfully!', 'ok');
                log('  - Title: ' + data.title, 'ok');
                
                // Load full data
                await loadSeriesData(currentSeriesId, data);
                
            } catch (error) {
                log('Step 8: Exception: ' + error.message, 'error');
                showError('Error: ' + error.message);
            }
        });

        async function loadSeriesData(seriesId, basicData) {
            try {
                // Get full series data
                const { data: series, error } = await window.db
                    .from('series')
                    .select('*')
                    .eq('id', seriesId)
                    .single();
                
                if (error) throw error;
                
                // Get vote count
                const { count: voteCount } = await window.db
                    .from('novel_votes')
                    .select('*', { count: 'exact', head: true })
                    .eq('novel_id', seriesId);
                
                // Update UI
                document.getElementById('seriesTitle').textContent = series.title;
                document.getElementById('seriesDescription').textContent = series.description || 'No description.';
                document.getElementById('seriesType').textContent = series.item_type || 'Series';
                document.getElementById('seriesStatus').textContent = series.status || 'Unknown';
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('contentState').classList.remove('hidden');
                
                log('Step 9: UI updated successfully!', 'ok');
                
            } catch (error) {
                log('Step 9: Failed to load full data: ' + error.message, 'error');
                showError('Failed to load data: ' + error.message);
            }
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
            lucide.createIcons();
        }
    </script>
<!-- Mobile Debug Console (Remove after debugging) -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
    if (/mobile/i.test(navigator.userAgent)) {
        eruda.init();
    }
</script>
</body>
</html>
