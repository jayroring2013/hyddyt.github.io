<script>
    document.addEventListener('DOMContentLoaded', async () => {
        lucide.createIcons();
        
        // Get series ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const seriesId = urlParams.get('id');
        
        if (!seriesId) {
            // Redirect to dashboard if no ID provided
            window.location.href = 'dashboard.html';
            return;
        }
        
        // Load series data
        await loadSeriesDetail(seriesId);
    });

    async function loadSeriesDetail(seriesId) {
        const { data: series, error } = await api.getSeriesById(seriesId);
        
        if (error || !series) {
            alert('Series not found');
            window.location.href = 'dashboard.html';
            return;
        }
        
        // Update page title
        document.title = `${series.title} - LiDex Analytics`;
        
        // Update header with series info
        // (Update the DOM elements with series data)
        
        // Load vote statistics
        const { data: votes } = await api.getVoteStats({ seriesId });
        
        // Update charts with real data
        updateCharts(series, votes);
    }

    // Vote button handler
    async function submitVote(seriesId) {
        const { data, error } = await api.submitVote({ seriesId });
        
        if (error) {
            alert('Failed to submit vote. Please try again.');
            return;
        }
        
        alert('Vote submitted successfully!');
        // Refresh the page to show updated stats
        location.reload();
    }

    function updateCharts(series, votes) {

</script>
